<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading…</title>
<meta name="description" content="">
<style>
  /* Self-contained site CSS — no external CDN required */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root { --brand: #6366f1; --brand-dark: #4f46e5; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', system-ui, sans-serif; background:#fff; color:#111827; line-height:1.6; -webkit-font-smoothing:antialiased; }
  img { max-width:100%; display:block; }
  a { color:inherit; text-decoration:none; }

  /* Layout */
  .max-w-5xl { max-width:64rem; margin-left:auto; margin-right:auto; }
  .max-w-3xl { max-width:48rem; margin-left:auto; margin-right:auto; }
  .px-6 { padding-left:1.5rem; padding-right:1.5rem; }
  .py-4 { padding-top:1rem; padding-bottom:1rem; }
  .py-8 { padding-top:2rem; padding-bottom:2rem; }
  .py-16 { padding-top:4rem; padding-bottom:4rem; }
  .py-24 { padding-top:6rem; padding-bottom:6rem; }
  .py-32 { padding-top:8rem; padding-bottom:8rem; }
  .py-1\.5 { padding-top:.375rem; padding-bottom:.375rem; }
  .mt-2 { margin-top:.5rem; }
  .mt-16 { margin-top:4rem; }
  .mb-1 { margin-bottom:.25rem; }
  .mb-2 { margin-bottom:.5rem; }
  .mb-4 { margin-bottom:1rem; }
  .mb-10 { margin-bottom:2.5rem; }

  /* Flex */
  .flex { display:flex; }
  .items-center { align-items:center; }
  .items-baseline { align-items:baseline; }
  .justify-between { justify-content:space-between; }
  .flex-wrap { flex-wrap:wrap; }
  .gap-1 { gap:.25rem; }
  .gap-1\.5 { gap:.375rem; }
  .gap-3 { gap:.75rem; }
  .gap-4 { gap:1rem; }
  .gap-6 { gap:1.5rem; }
  .gap-x-3 { column-gap:.75rem; }
  .gap-y-1 { row-gap:.25rem; }
  .min-w-0 { min-width:0; }
  .flex-shrink-0 { flex-shrink:0; }
  .flex-1 { flex:1 1 0%; }
  .hidden { display:none; }

  /* Grid */
  .grid { display:grid; }

  /* Text */
  .text-xs { font-size:.75rem; line-height:1rem; }
  .text-sm { font-size:.875rem; line-height:1.25rem; }
  .text-base { font-size:1rem; line-height:1.5rem; }
  .text-lg { font-size:1.125rem; line-height:1.75rem; }
  .text-xl { font-size:1.25rem; line-height:1.75rem; }
  .text-3xl { font-size:1.875rem; line-height:2.25rem; }
  .text-4xl { font-size:2.25rem; line-height:2.5rem; }
  .font-medium { font-weight:500; }
  .font-semibold { font-weight:600; }
  .font-bold { font-weight:700; }
  .leading-tight { line-height:1.25; }
  .leading-relaxed { line-height:1.625; }
  .truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .line-clamp-3 { display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:3; overflow:hidden; }
  .tracking-tight { letter-spacing:-.025em; }
  .uppercase { text-transform:uppercase; }

  /* Colors */
  .text-gray-400 { color:#9ca3af; }
  .text-gray-500 { color:#6b7280; }
  .text-gray-600 { color:#4b5563; }
  .text-gray-700 { color:#374151; }
  .text-white { color:#fff; }
  .text-indigo-300 { color:#a5b4fc; }
  .text-indigo-600 { color:#4f46e5; }
  .bg-white { background:#fff; }
  .bg-gray-100 { background:#f3f4f6; }
  .bg-indigo-100 { background:#e0e7ff; }
  .bg-indigo-50 { background:#eef2ff; }
  .bg-purple-100 { background:#f3e8ff; }

  /* Border */
  .border { border-width:1px; }
  .border-t { border-top-width:1px; }
  .border-b { border-bottom-width:1px; }
  .border-gray-100 { border-color:#f3f4f6; }
  .rounded-xl { border-radius:.75rem; }
  .rounded-2xl { border-radius:1rem; }
  .rounded-full { border-radius:9999px; }
  .overflow-hidden { overflow:hidden; }

  /* Shadow */
  .shadow-sm { box-shadow:0 1px 2px 0 rgba(0,0,0,.05); }
  .shadow-lg { box-shadow:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1); }

  /* Position */
  .sticky { position:sticky; }
  .relative { position:relative; }
  .absolute { position:absolute; }
  .inset-0 { inset:0; }
  .top-0 { top:0; }
  .z-50 { z-index:50; }
  .left-\[-7px\] { left:-7px; }
  .top-1\.5 { top:.375rem; }

  /* Size */
  .w-3 { width:.75rem; }
  .h-3 { height:.75rem; }
  .w-5 { width:1.25rem; }
  .h-5 { height:1.25rem; }
  .w-6 { width:1.5rem; }
  .h-6 { height:1.5rem; }
  .w-10 { width:2.5rem; }
  .h-10 { height:2.5rem; }
  .w-full { width:100%; }
  .h-44 { height:11rem; }
  .h-1 { height:.25rem; }
  .min-h-screen { min-height:100vh; }
  .min-h-\[420px\] { min-height:420px; }

  /* Object */
  .object-cover { object-fit:cover; }

  /* Animation */
  .animate-spin { animation:spin 1s linear infinite; }
  @keyframes spin{to{transform:rotate(360deg)}}
  .animate-ping { animation:ping 1s cubic-bezier(0,0,.2,1) infinite; }
  @keyframes ping{75%,100%{transform:scale(2);opacity:0}}

  /* Backdrop */
  .backdrop-blur-md { backdrop-filter:blur(12px); }

  /* Misc */
  .cursor-pointer { cursor:pointer; }
  .pointer-events-none { pointer-events:none; }
  .select-none { user-select:none; }
  .opacity-75 { opacity:.75; }
  .border-2 { border-width:2px; }
  .border-indigo-100 { border-color:#e0e7ff; }
  .pl-8 { padding-left:2rem; }

  /* Navbar */
  nav { background:rgba(255,255,255,.92); border-bottom:1px solid #f3f4f6; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  nav .brand { font-weight:700; font-size:1.125rem; letter-spacing:-.025em; color:var(--brand); }
  nav .nav-links { display:none; gap:1.5rem; font-size:.875rem; font-weight:500; color:#4b5563; }
  nav .nav-links a { transition:color .15s; }
  nav .nav-links a:hover, nav .nav-links a.active { color:var(--brand); }
  nav .mobile-btn { background:none; border:none; cursor:pointer; padding:.25rem; }
  .mobile-menu { border-top:1px solid #f3f4f6; }
  .mobile-menu a { display:block; padding:.375rem 0; font-size:.875rem; font-weight:500; color:#374151; }
  .mobile-menu a:hover { color:var(--brand); }
  @media(min-width:768px){
    nav .nav-links { display:flex; }
    nav .mobile-btn { display:none; }
    .grid-2col { grid-template-columns:repeat(2,1fr); }
    .grid-3col { grid-template-columns:repeat(3,1fr); }
    .text-md-xl { font-size:1.25rem; }
    .text-md-5xl { font-size:3rem; line-height:1; }
  }

  /* Timeline component */
  .timeline-item { position:relative; padding-left:2rem; border-left:2px solid #e0e7ff; }
  .timeline-dot { width:.75rem; height:.75rem; border-radius:50%; background:var(--brand); position:absolute; left:-.4375rem; top:.375rem; }
  .timeline-role { font-weight:600; font-size:1rem; }
  .timeline-company { font-size:.875rem; font-weight:500; color:var(--brand); }
  .timeline-date { font-size:.75rem; color:#9ca3af; margin:.25rem 0 .5rem; }
  .timeline-desc { font-size:.875rem; color:#4b5563; }
  .space-y-10 > * + * { margin-top:2.5rem; }

  /* Hero */
  .hero { position:relative; min-height:420px; display:flex; align-items:center; background:linear-gradient(135deg,#eef2ff 0%,#fff 100%); }
  .hero.has-bg { background-size:cover; background-position:center; }
  .hero.has-bg::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,.45); }
  .hero-content { position:relative; z-index:1; }
  .hero-title { font-size:2.25rem; font-weight:700; line-height:1.2; margin-bottom:1rem; }
  .hero-subtitle { font-size:1.125rem; margin-bottom:2rem; max-width:36rem; }
  .hero.has-bg .hero-title, .hero.has-bg .hero-subtitle { color:#fff; }
  .hero.has-bg .hero-subtitle { color:rgba(255,255,255,.82); }
  .btn-primary { display:inline-flex; align-items:center; gap:.5rem; padding:.75rem 1.5rem; border-radius:.75rem; font-weight:600; color:#fff; background:var(--brand); box-shadow:0 4px 14px rgba(99,102,241,.35); transition:transform .2s,box-shadow .2s; }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(99,102,241,.4); }
  @media(min-width:768px){ .hero-title { font-size:3rem; } .hero-subtitle { font-size:1.25rem; } }

  /* Section heading */
  .section-heading { font-size:1.875rem; font-weight:700; margin-bottom:.5rem; }
  .section-bar { width:3rem; height:.25rem; border-radius:9999px; background:var(--brand); margin-bottom:2.5rem; }

  /* Project card */
  .proj-card { background:#fff; border:1px solid #f3f4f6; border-radius:1rem; overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,.05); transition:transform .2s,box-shadow .2s; }
  .proj-card:hover { transform:translateY(-3px); box-shadow:0 12px 30px rgba(0,0,0,.10); }
  .proj-placeholder { width:100%; height:11rem; background:linear-gradient(135deg,#e0e7ff,#f3e8ff); display:flex; align-items:center; justify-content:center; }
  .proj-body { padding:1.25rem; }
  .proj-name { font-weight:600; font-size:1.125rem; margin-bottom:.5rem; }
  .proj-desc { font-size:.875rem; color:#6b7280; margin-bottom:1rem; display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:3; overflow:hidden; }
  .tech-pills { display:flex; flex-wrap:wrap; gap:.375rem; margin-bottom:1rem; }
  .tech-pill { display:inline-block; padding:.125rem .625rem; border-radius:9999px; font-size:.7rem; font-weight:500; background:#e0e7ff; color:#4338ca; }
  .proj-link { display:inline-flex; align-items:center; gap:.25rem; font-size:.875rem; font-weight:500; color:var(--brand); }
  .grid-projects { display:grid; gap:1.5rem; grid-template-columns:1fr; }
  @media(min-width:640px){ .grid-projects { grid-template-columns:repeat(2,1fr); } }
  @media(min-width:1024px){ .grid-projects { grid-template-columns:repeat(3,1fr); } }

  /* Contact */
  .contact-grid { display:grid; gap:1rem; grid-template-columns:1fr; }
  @media(min-width:640px){ .contact-grid { grid-template-columns:repeat(2,1fr); } }
  .contact-card { display:flex; align-items:center; gap:.75rem; padding:1rem; border-radius:.75rem; background:#f8fafc; transition:background .15s,transform .15s; }
  .contact-card:hover { background:#eef2ff; transform:translateY(-2px); }
  .contact-icon { width:2.5rem; height:2.5rem; border-radius:.75rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:#eef2ff; }
  .contact-label { font-size:.75rem; font-weight:500; color:#9ca3af; }
  .contact-value { font-size:.875rem; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* Footer */
  footer { border-top:1px solid #f3f4f6; padding:2rem 0; margin-top:4rem; }
  footer p { text-align:center; font-size:.875rem; color:#9ca3af; }

  /* Loading spinner */
  .spinner { display:flex; align-items:center; justify-content:center; padding:8rem 0; }
  .spinner div { width:2rem; height:2rem; border:2px solid var(--brand); border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite; }

  /* Fade-up animation */
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
  .fade-up { animation:fadeUp .45s ease both; }

  /* ── Additional component styles ── */
  /* Hero with background image */
  .hero-bg { background-size:cover; background-position:center; }
  .hero-bg::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,.45); }

  /* Nav link active / hover state */
  .nav-link { transition:color .15s; }
  .nav-link.active, .nav-link:hover { color:var(--brand); }

  /* Contact card as anchor */
  .contact-card { text-decoration:none; color:inherit; }
  .contact-card:hover { background:#eef2ff; transform:translateY(-2px); }

  /* ── Missing utility classes (Tailwind-equivalent) ── */
  .antialiased { -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
  .block { display:block; }
  .text-center { text-align:center; }
  .transition-all { transition:all .15s ease; }
  .z-10 { z-index:10; }
  .mb-8 { margin-bottom:2rem; }
  .py-3 { padding-top:.75rem; padding-bottom:.75rem; }
  .p-1 { padding:.25rem; }
  .p-5 { padding:1.25rem; }
  .space-y-2 > * + * { margin-top:.5rem; }
  .space-y-10 > * + * { margin-top:2.5rem; }
  .max-w-xl { max-width:36rem; margin-left:auto; margin-right:auto; }
  .max-w-2xl { max-width:42rem; margin-left:auto; margin-right:auto; }
  .tracking-tight { letter-spacing:-.025em; }
  .leading-tight { line-height:1.25; }
  .leading-relaxed { line-height:1.625; }
  .line-clamp-3 { display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:3; overflow:hidden; }
  .truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .overflow-hidden { overflow:hidden; }

  /* Background white with opacity (navbar) */
  .bg-white\/90 { background:rgba(255,255,255,.9); }

  /* Gradient background for project placeholder */
  .bg-gradient-to-br { background-image:linear-gradient(135deg,#e0e7ff,#f3e8ff); }

  /* Hover interactions */
  .hover\:scale-105:hover { transform:scale(1.05); }
  .hover\:shadow-xl:hover { box-shadow:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.1); }
  .hover\:text-indigo-600:hover { color:#4f46e5; }

  /* Responsive grid columns — sm, md, lg breakpoints */
  @media(min-width:640px){
    .sm\:grid-cols-2 { grid-template-columns:repeat(2,1fr); }
  }
  @media(min-width:768px){
    /* Responsive display utilities */
    .md\:flex { display:flex !important; }
    .md\:hidden { display:none !important; }
    .md\:block { display:block !important; }
    .md\:grid-cols-2 { grid-template-columns:repeat(2,1fr); }
    .md\:text-5xl { font-size:3rem; line-height:1.1; }
    .md\:text-xl { font-size:1.25rem; line-height:1.75rem; }
  }
  @media(min-width:1024px){
    .lg\:grid-cols-3 { grid-template-columns:repeat(3,1fr); }
  }
</style>
</head>
<body class="bg-white text-gray-900 antialiased">

<!-- ── Navbar ──────────────────────────────────────────── -->
<nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="/" class="font-bold text-lg tracking-tight" style="color:var(--brand)" id="siteName">Site</a>
    <div class="hidden md:flex items-center gap-6 text-sm font-medium text-gray-600" id="navLinks"></div>
    <!-- Mobile menu -->
    <button class="md:hidden p-1" onclick="toggleMobileMenu()">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>
  <div id="mobileMenu" class="hidden md:hidden border-t border-gray-100 px-6 py-3 space-y-2"></div>
</nav>

<!-- ── Page content ────────────────────────────────────── -->
<main id="pageContent" class="min-h-screen"></main>

<!-- ── Footer ──────────────────────────────────────────── -->
<footer class="border-t border-gray-100 py-8 mt-16">
  <div class="max-w-5xl mx-auto px-6 text-center text-sm text-gray-400" id="footerText">
    Built with Site Manager
  </div>
</footer>

<script>
// ═══════════════════════════════════════════════════════
//  ROUTER
// ═══════════════════════════════════════════════════════
const routes = {
  '/':          'home',
  '/projects':  'projects',
  '/cv':        'cv',
  '/contacts':  'contacts',
};

// Figure out which slug to load from the URL path
function getSlug() {
  const path = window.location.pathname.replace(/\/$/, '') || '/';
  return routes[path] || 'home';
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
async function init() {
  // Load pages for nav
  let pages = [];
  try { pages = await fetch('/api/pages').then(r => r.json()); } catch {}

  // Set site name from settings
  try {
    const settings = await fetch('/api/site').then(r => r.json());
    if (settings.site_name) {
      document.getElementById('siteName').textContent = settings.site_name;
      document.title = settings.site_name;
    }
    if (settings.site_description) {
      document.querySelector('meta[name="description"]').content = settings.site_description;
    }
  } catch {}

  // Build nav
  buildNav(pages);

  // Load page blocks
  const slug = getSlug();
  await loadPage(slug);
}

function buildNav(pages) {
  const slugToPath = { home: '/', projects: '/projects', cv: '/cv', contacts: '/contacts' };
  const currentSlug = getSlug();
  const html = pages.map(p => {
    const href = slugToPath[p.slug] || ('/' + p.slug);
    const active = p.slug === currentSlug ? 'active' : '';
    return `<a href="${href}" class="nav-link ${active}">${escHtml(p.title)}</a>`;
  }).join('');
  document.getElementById('navLinks').innerHTML = html;
  document.getElementById('mobileMenu').innerHTML = pages.map(p => {
    const href = slugToPath[p.slug] || ('/' + p.slug);
    return `<a href="${href}" class="block py-1.5 text-sm font-medium text-gray-700 hover:text-indigo-600">${escHtml(p.title)}</a>`;
  }).join('');
}

function toggleMobileMenu() {
  document.getElementById('mobileMenu').classList.toggle('hidden');
}

async function loadPage(slug) {
  const content = document.getElementById('pageContent');
  content.innerHTML = '<div class="flex items-center justify-center py-32"><div class="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div></div>';
  try {
    const blocks = await fetch(`/api/pages/${slug}/blocks`).then(r => r.json());
    if (!blocks.length) {
      content.innerHTML = '<div class="max-w-2xl mx-auto px-6 py-32 text-center text-gray-400">No content yet.</div>';
      return;
    }
    content.innerHTML = blocks.map(b => renderBlock(b)).join('');
    // Trigger animations
    content.querySelectorAll('.fade-up').forEach((el, i) => {
      el.style.animationDelay = (i * 0.08) + 's';
    });
  } catch (err) {
    content.innerHTML = '<div class="max-w-2xl mx-auto px-6 py-32 text-center text-gray-400">Failed to load content.</div>';
  }
}

// ═══════════════════════════════════════════════════════
//  BLOCK RENDERERS
// ═══════════════════════════════════════════════════════
function renderBlock(block) {
  const c = block.content || {};
  switch (block.type) {
    case 'hero':         return renderHero(c);
    case 'projects_grid': return renderProjectsGrid(c);
    case 'timeline':     return renderTimeline(c);
    case 'contact':      return renderContact(c);
    default:             return '';
  }
}

// ── Hero
function renderHero(c) {
  const hasBg = !!c.background_image;
  const bgStyle = hasBg ? `style="background-image:url('${escAttr(c.background_image)}')"` : '';
  const textColor = hasBg ? 'text-white' : 'text-gray-900';
  const subColor = hasBg ? 'text-white/80' : 'text-gray-500';

  return `
  <section class="relative ${hasBg ? 'hero-bg' : 'bg-gradient-to-br from-indigo-50 to-white'} min-h-[420px] flex items-center" ${bgStyle}>
    <div class="relative z-10 max-w-5xl mx-auto px-6 py-24 fade-up">
      ${c.title ? `<h1 class="text-4xl md:text-5xl font-bold leading-tight mb-4 ${textColor}">${escHtml(c.title)}</h1>` : ''}
      ${c.subtitle ? `<p class="text-lg md:text-xl mb-8 max-w-xl ${subColor}">${escHtml(c.subtitle)}</p>` : ''}
      ${c.primary_button_text ? `<a href="${escAttr(c.primary_button_link || '#')}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-white shadow-lg transition-all hover:scale-105 hover:shadow-xl" style="background:var(--brand)">${escHtml(c.primary_button_text)}</a>` : ''}
    </div>
  </section>`;
}

// ── Projects Grid
function renderProjectsGrid(c) {
  const projects = c.projects || [];
  return `
  <section class="max-w-5xl mx-auto px-6 py-16 fade-up">
    ${c.title ? `<h2 class="text-3xl font-bold mb-2">${escHtml(c.title)}</h2><div class="w-12 h-1 rounded-full mb-10" style="background:var(--brand)"></div>` : ''}
    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      ${projects.map(p => projectCard(p)).join('')}
    </div>
  </section>`;
}

function projectCard(p) {
  const techList = Array.isArray(p.tech_stack) ? p.tech_stack : (p.tech_stack || '').split(',').map(s => s.trim()).filter(Boolean);
  return `
  <div class="proj-card bg-white border border-gray-100 rounded-2xl overflow-hidden shadow-sm">
    ${p.image ? `<img src="${escAttr(p.image)}" alt="${escAttr(p.name||'')}" class="w-full h-44 object-cover">` : `<div class="w-full h-44 bg-gradient-to-br from-indigo-100 to-purple-100 flex items-center justify-center"><svg class="w-10 h-10 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg></div>`}
    <div class="p-5">
      <h3 class="font-semibold text-lg mb-2">${escHtml(p.name||'Untitled')}</h3>
      ${p.description ? `<p class="text-sm text-gray-500 mb-4 line-clamp-3">${escHtml(p.description)}</p>` : ''}
      ${techList.length ? `<div class="flex flex-wrap gap-1.5 mb-4">${techList.map(t => `<span class="tech-pill">${escHtml(t)}</span>`).join('')}</div>` : ''}
      ${p.link ? `<a href="${escAttr(p.link)}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-sm font-medium" style="color:var(--brand)">View Project <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></a>` : ''}
    </div>
  </div>`;
}

// ── Timeline
function renderTimeline(c) {
  const items = c.items || [];
  return `
  <section class="max-w-3xl mx-auto px-6 py-16 fade-up">
    ${c.title ? `<h2 class="text-3xl font-bold mb-2">${escHtml(c.title)}</h2><div class="w-12 h-1 rounded-full mb-10" style="background:var(--brand)"></div>` : ''}
    <div class="space-y-10">
      ${items.map(it => timelineItem(it)).join('')}
    </div>
  </section>`;
}

function timelineItem(it) {
  const period = [it.start_date, it.end_date].filter(Boolean).join(' – ') || '';
  return `
  <div class="relative pl-8 border-l-2 border-indigo-100">
    <div class="absolute w-3 h-3 rounded-full left-[-7px] top-1.5" style="background:var(--brand)"></div>
    <div class="flex flex-wrap items-baseline gap-x-3 gap-y-1 mb-1">
      ${it.role ? `<h3 class="font-semibold text-base">${escHtml(it.role)}</h3>` : ''}
      ${it.company ? `<span class="text-sm font-medium text-indigo-600">${escHtml(it.company)}</span>` : ''}
    </div>
    ${period ? `<p class="text-xs text-gray-400 mb-2">${escHtml(period)}</p>` : ''}
    ${it.description ? `<p class="text-sm text-gray-600 leading-relaxed">${escHtml(it.description)}</p>` : ''}
  </div>`;
}

// ── Contact
function renderContact(c) {
  const links = [
    c.email    && { href: `mailto:${c.email}`,  label: 'Email',    icon: emailIcon(),    value: c.email },
    c.github   && { href: c.github,             label: 'GitHub',   icon: githubIcon(),   value: c.github },
    c.linkedin && { href: c.linkedin,           label: 'LinkedIn', icon: linkedinIcon(), value: c.linkedin },
    c.website  && { href: c.website,            label: 'Website',  icon: globeIcon(),    value: c.website },
  ].filter(Boolean);

  return `
  <section class="max-w-3xl mx-auto px-6 py-16 fade-up">
    <h2 class="text-3xl font-bold mb-2">Get In Touch</h2>
    <div class="w-12 h-1 rounded-full mb-10" style="background:var(--brand)"></div>
    <div class="grid sm:grid-cols-2 gap-4">
      ${links.map(l => `
        <a href="${escAttr(l.href)}" target="${l.href.startsWith('mailto') ? '_self' : '_blank'}" rel="noopener" class="contact-card">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0" style="background:#eef2ff">${l.icon}</div>
          <div class="min-w-0">
            <p class="text-xs font-medium text-gray-400">${l.label}</p>
            <p class="text-sm font-medium truncate">${escHtml(l.value)}</p>
          </div>
        </a>`).join('')}
    </div>
  </section>`;
}

// ── Icon helpers
function emailIcon() { return `<svg class="w-5 h-5" style="color:var(--brand)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>`; }
function githubIcon() { return `<svg class="w-5 h-5" style="color:var(--brand)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>`; }
function linkedinIcon() { return `<svg class="w-5 h-5" style="color:var(--brand)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>`; }
function globeIcon() { return `<svg class="w-5 h-5" style="color:var(--brand)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`; }

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
init();
</script>
</body>
</html>
